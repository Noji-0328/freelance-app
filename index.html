<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>フリーランス管理ツール</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <!-- ナビゲーション -->
    <nav class="navbar">
      <div class="navbar-brand">
        <span class="brand-icon">⚡</span>
        <span class="brand-name">FL Manager</span>
      </div>
      <div class="navbar-menu">
        <button class="nav-btn active" data-tab="tasks">タスクボード</button>
        <button class="nav-btn" data-tab="clients">クライアント</button>
        <button class="nav-btn" data-tab="invoice">請求書</button>
        <button class="nav-btn" data-tab="myinfo">自分の情報</button>
        <button class="nav-btn" data-tab="backup">バックアップ</button>
      </div>
      <button class="hamburger" id="hamburger">
        <span></span><span></span><span></span>
      </button>
    </nav>

    <!-- アラートバナー -->
    <div id="alert-banner" class="alert-banner hidden"></div>

    <!-- メインコンテンツ -->
    <main class="main-content">

      <!-- タスクボード -->
      <section id="tab-tasks" class="tab-section active">
        <div class="section-header">
          <h2>タスクボード</h2>
          <button class="btn btn-primary" id="add-task-btn">+ タスク追加</button>
        </div>
        <div class="kanban-board" id="kanban-board">
          <div class="kanban-column" data-status="todo">
            <div class="column-header">
              <span class="column-title">未着手</span>
              <span class="column-count" id="count-todo">0</span>
            </div>
            <div class="card-list" id="col-todo"></div>
          </div>
          <div class="kanban-column" data-status="wip">
            <div class="column-header">
              <span class="column-title">進行中</span>
              <span class="column-count" id="count-wip">0</span>
            </div>
            <div class="card-list" id="col-wip"></div>
          </div>
          <div class="kanban-column" data-status="done">
            <div class="column-header">
              <span class="column-title">完了</span>
              <span class="column-count" id="count-done">0</span>
            </div>
            <div class="card-list" id="col-done"></div>
          </div>
        </div>
      </section>

      <!-- クライアント管理 -->
      <section id="tab-clients" class="tab-section">
        <div class="section-header">
          <h2>クライアント管理</h2>
          <button class="btn btn-primary" id="add-client-btn">+ クライアント追加</button>
        </div>
        <div class="client-list" id="client-list"></div>
      </section>

      <!-- 請求書 -->
      <section id="tab-invoice" class="tab-section">
        <div class="section-header">
          <h2>請求書作成</h2>
        </div>
        <div class="invoice-form card">
          <div class="form-group">
            <label>クライアント</label>
            <select id="invoice-client"></select>
          </div>
          <div class="form-group">
            <label>対象月</label>
            <input type="month" id="invoice-month" />
          </div>
          <div class="form-group">
            <label>請求番号</label>
            <input type="text" id="invoice-number" placeholder="INV-2024-001" />
          </div>
          <div class="form-group">
            <label>支払期限</label>
            <input type="date" id="invoice-due" />
          </div>
          <button class="btn btn-primary" id="preview-invoice-btn">プレビュー & PDF出力</button>
        </div>
        <div class="invoice-preview card hidden" id="invoice-preview">
          <div id="invoice-content"></div>
          <div class="invoice-actions">
            <button class="btn btn-primary" id="download-pdf-btn">PDFダウンロード</button>
          </div>
        </div>
      </section>

      <!-- 自分の情報 -->
      <section id="tab-myinfo" class="tab-section">
        <div class="section-header">
          <h2>自分の情報</h2>
        </div>
        <div class="card myinfo-form">
          <div class="form-group">
            <label>氏名 / 屋号</label>
            <input type="text" id="my-name" placeholder="山田 太郎 / タロウ商店" />
          </div>
          <div class="form-group">
            <label>住所</label>
            <input type="text" id="my-address" placeholder="東京都渋谷区..." />
          </div>
          <div class="form-group">
            <label>電話番号</label>
            <input type="tel" id="my-phone" placeholder="090-1234-5678" />
          </div>
          <div class="form-group">
            <label>メールアドレス</label>
            <input type="email" id="my-email" placeholder="you@example.com" />
          </div>
          <div class="form-group">
            <label>振込先銀行口座</label>
            <textarea id="my-bank" rows="3" placeholder="〇〇銀行 〇〇支店 普通 1234567 ヤマダ タロウ"></textarea>
          </div>
          <button class="btn btn-primary" id="save-myinfo-btn">保存</button>
        </div>
      </section>

      <!-- バックアップ -->
      <section id="tab-backup" class="tab-section">
        <div class="section-header">
          <h2>バックアップ / リストア</h2>
        </div>
        <div class="backup-section">
          <div class="card">
            <h3>バックアップ</h3>
            <p class="text-muted">全データ（タスク・クライアント・自分の情報）をJSONファイルとしてダウンロードします。</p>
            <button class="btn btn-primary" id="backup-btn">バックアップをダウンロード</button>
          </div>
          <div class="card">
            <h3>リストア</h3>
            <p class="text-muted">バックアップJSONファイルを選択して、データを復元します。既存データは上書きされます。</p>
            <div class="form-group">
              <input type="file" id="restore-file" accept=".json" />
            </div>
            <button class="btn btn-danger" id="restore-btn">リストア実行</button>
          </div>
          <div class="card">
            <h3>Push通知</h3>
            <p class="text-muted">期限が近いタスクをブラウザ通知で受け取ります。</p>
            <button class="btn btn-secondary" id="push-notify-btn">通知を許可する</button>
            <span id="notify-status" class="text-muted"></span>
          </div>
        </div>
      </section>

    </main>
  </div>

  <!-- タスクモーダル -->
  <div class="modal hidden" id="task-modal">
    <div class="modal-backdrop"></div>
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="task-modal-title">タスク追加</h3>
        <button class="modal-close" id="task-modal-close">×</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="task-id" />
        <div class="form-group">
          <label>タスク名 <span class="required">*</span></label>
          <input type="text" id="task-name" placeholder="タスク名を入力" required />
        </div>
        <div class="form-group">
          <label>詳細</label>
          <textarea id="task-detail" rows="3" placeholder="詳細を入力"></textarea>
        </div>
        <div class="form-group">
          <label>クライアント</label>
          <select id="task-client"></select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>単価（税込）</label>
            <input type="number" id="task-price" placeholder="0" min="0" />
          </div>
          <div class="form-group">
            <label>期限</label>
            <input type="date" id="task-due" />
          </div>
        </div>
        <div class="form-group">
          <label>ステータス</label>
          <select id="task-status">
            <option value="todo">未着手</option>
            <option value="wip">進行中</option>
            <option value="done">完了</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="task-modal-cancel">キャンセル</button>
        <button class="btn btn-primary" id="task-modal-save">保存</button>
        <button class="btn btn-danger hidden" id="task-modal-delete">削除</button>
      </div>
    </div>
  </div>

  <!-- クライアントモーダル -->
  <div class="modal hidden" id="client-modal">
    <div class="modal-backdrop"></div>
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="client-modal-title">クライアント追加</h3>
        <button class="modal-close" id="client-modal-close">×</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="client-id" />
        <div class="form-group">
          <label>会社名 / 氏名 <span class="required">*</span></label>
          <input type="text" id="client-name" placeholder="株式会社〇〇 / 山田様" required />
        </div>
        <div class="form-group">
          <label>担当者名</label>
          <input type="text" id="client-contact" placeholder="担当者名" />
        </div>
        <div class="form-group">
          <label>住所</label>
          <input type="text" id="client-address" placeholder="住所" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>電話番号</label>
            <input type="tel" id="client-phone" placeholder="03-1234-5678" />
          </div>
          <div class="form-group">
            <label>メール</label>
            <input type="email" id="client-email" placeholder="client@example.com" />
          </div>
        </div>
        <div class="form-group">
          <label>メモ</label>
          <textarea id="client-memo" rows="3" placeholder="メモ"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="client-modal-cancel">キャンセル</button>
        <button class="btn btn-primary" id="client-modal-save">保存</button>
        <button class="btn btn-danger hidden" id="client-modal-delete">削除</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
